<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Tienda de Vinilos</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

  <header class="main-header">
    <h1>Tienda de Vinilos</h1>
    <p>Desarrollado por Stefania Cardenas</p>
  </header>

  <div class="container">

    <div class="form-panel">
      <h2>Agregar Productos</h2>

      <label>Imagen (URL)</label>
      <input type="text" id="imagen" placeholder="https://ejemplo.com/vinilo.jpg">

      <label>Título</label>
      <input type="text" id="titulo" placeholder="Nombre del álbum o artista">

      <label>Descripción</label>
      <textarea id="descripcion" placeholder="Breve descripción del vinilo"></textarea>

      <label>Valor</label>
      <input type="number" id="precio" placeholder="Ej: 150000">

      <label>Cupón</label>
      <input type="text" id="cupon" placeholder="DESC50">

      <button onclick="guardarProducto()">Guardar</button>

      <p class="info-cupon">Cupón: <strong>DESC50</strong> - 50% descuento</p>
    </div>

    <div class="product-panel">
      <div class="header">
        <h2>Productos</h2>
        <span id="contador">0 productos</span>
      </div>

      <p id="mensaje">Aún no hay productos cargados.</p>

      <div id="contenedor" class="contenedor"></div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
